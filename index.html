<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWAG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --red: #C41E3A; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      color:#fff;
      font-family:'Inter', sans-serif;
      overflow:hidden;
      cursor:none;
    }

    .cursor {
      position:fixed;
      width:24px;
      height:24px;
      border:1.5px solid var(--red);
      border-radius:50%;
      pointer-events:none;
      z-index:9999;
      mix-blend-mode:difference;
      transition: all 0.2s ease;
    }

    video {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      object-fit:cover;
      z-index:1;
      filter: contrast(1.15) saturate(1.3);
    }

    .film-grain {
      position:fixed;
      inset:0;
      background:repeating-linear-gradient(transparent 0px, rgba(255,255,255,0.025) 1px, transparent 2px);
      pointer-events:none;
      z-index:20;
      opacity:0.45;
    }

    .subtitle {
      position:fixed;
      bottom:9%;
      left:50%;
      transform:translateX(-50%);
      font-size:1.35rem;
      font-weight:500;
      text-align:center;
      letter-spacing:3px;
      text-transform:uppercase;
      text-shadow:0 0 30px rgba(0,0,0,0.9);
      z-index:30;
      white-space:nowrap;
    }

    /* CALL OVERLAY - Modern */
    .call-overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.92);
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:50;
    }
    .call-title {
      font-family:'Space Grotesk', sans-serif;
      font-size:4.2rem;
      font-weight:700;
      letter-spacing:-2px;
      color:var(--red);
      margin-bottom:50px;
      text-shadow:0 0 40px var(--red);
    }
    .btn {
      padding:20px 70px;
      font-size:1.6rem;
      font-weight:600;
      margin:12px;
      border:2px solid;
      cursor:pointer;
      transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
      letter-spacing:1px;
    }
    #answer {
      border-color:var(--red);
      background:rgba(196,30,58,0.1);
    }
    #answer:hover {
      background:var(--red);
      transform:scale(1.05);
      box-shadow:0 0 40px rgba(196,30,58,0.6);
    }
    #decline {
      border-color:#444;
      color:#888;
    }

    /* CHOICES - Modern */
    .choice-container {
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      gap:40px;
      z-index:60;
    }
    .choice {
      width:300px;
      text-align:center;
      cursor:pointer;
      transition:all 0.5s cubic-bezier(0.23,1,0.32,1);
    }
    .choice:hover {
      transform:scale(1.08) translateY(-10px);
    }
    .choice video {
      width:100%;
      height:190px;
      object-fit:cover;
      border:1px solid rgba(196,30,58,0.3);
      border-radius:4px;
    }
    .choice h2 {
      font-family:'Space Grotesk', sans-serif;
      font-size:1.8rem;
      margin-top:16px;
      letter-spacing:2px;
    }

    /* FINAL SCREEN */
    .final-screen {
      position:fixed;
      inset:0;
      background:#000;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:100;
      text-align:center;
    }

    .run-text {
      font-family:'Space Grotesk', sans-serif;
      font-size:4.8rem;
      font-weight:700;
      line-height:1.1;
      letter-spacing:-3px;
      color:#fff;
      text-shadow:0 0 60px var(--red);
      margin-bottom:20px;
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- YOUR ROOFTOP VIDEO -->
  <video id="mainVideo" autoplay muted playsinline loop>
    <source src="https://i.imgur.com/DCMK44t.mp4" type="video/mp4">
  </video>

  <div class="subtitle" id="subtitle"></div>

  <!-- CALL OVERLAY -->
  <div class="call-overlay" id="callOverlay">
    <div class="call-title">INCOMING CALL: SWAG</div>
    <div>
      <div class="btn" id="answer">ANSWER</div>
      <div class="btn" id="decline">DECLINE</div>
    </div>
  </div>

  <!-- CHOICES -->
  <div class="choice-container" id="choices">
    <div class="choice" data-choice="join">
      <video src="YOUR_JOIN_LINK.mp4" muted loop></video>
      <h2>JOIN</h2>
    </div>
    <div class="choice" data-choice="observe">
      <video src="YOUR_OBSERVE_LINK.mp4" muted loop></video>
      <h2>OBSERVE</h2>
    </div>
    <div class="choice" data-choice="run">
      <video src="YOUR_RUN_LINK.mp4" muted loop></video>
      <h2>RUN</h2>
    </div>
  </div>

  <!-- FINAL SCREEN -->
  <div class="final-screen" id="final">
    <h1 style="font-size:5.8rem; font-family:'Space Grotesk'; letter-spacing:-4px; margin-bottom:30px;">YOU HAVE BEEN SELECTED</h1>
    
    <div id="runMessage" style="display:none;">
      <div class="run-text">EVERY SATURDAY<br>6 AM</div>
      <div class="run-text" style="font-size:3.2rem; color:var(--red);">PRELLER SQUARE</div>
    </div>

    <form style="margin-top:50px; width:440px; text-align:center;">
      <input type="text" placeholder="NAME" style="width:100%; background:transparent; border:2px solid #C41E3A; color:white; padding:16px; margin:10px 0; font-size:1.1rem;">
      <input type="text" placeholder="EMAIL OR WHATSAPP" style="width:100%; background:transparent; border:2px solid #C41E3A; color:white; padding:16px; margin:10px 0; font-size:1.1rem;">
      <textarea placeholder="WHY DO YOU WANT SWAG?" style="width:100%; height:130px; background:transparent; border:2px solid #C41E3A; color:white; padding:16px; margin:10px 0; resize:none;"></textarea>
      <button type="button" onclick="enterMovement()" style="margin-top:30px; padding:20px 90px; font-size:1.5rem; background:transparent; border:2px solid #C41E3A; color:white; cursor:pointer; font-weight:600;">ENTER THE MOVEMENT</button>
    </form>
  </div>

  <div class="film-grain"></div>

  <script>
    const video = document.getElementById('mainVideo');
    const subtitle = document.getElementById('subtitle');
    const callOverlay = document.getElementById('callOverlay');
    const choices = document.getElementById('choices');
    const final = document.getElementById('final');
    const runMessage = document.getElementById('runMessage');
    const cursor = document.getElementById('cursor');

    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // Phone rings at 10 seconds
    setTimeout(() => {
      subtitle.textContent = "A PHONE IS RINGING...";
      callOverlay.style.display = 'flex';
      callOverlay.style.pointerEvents = 'all';
    }, 10000);

    document.getElementById('answer').addEventListener('click', () => {
      callOverlay.style.display = 'none';
      subtitle.textContent = "YOU WEREN’T SUPPOSED TO FIND US… BUT YOU DID.";

      setTimeout(() => {
        subtitle.textContent = "THE MOVEMENT IS CALLING.";
        setTimeout(() => choices.style.display = 'flex', 2800);
      }, 3800);
    });

    document.getElementById('decline').addEventListener('click', () => {
      subtitle.textContent = "THE RINGING GETS LOUDER...";
    });

    document.querySelectorAll('.choice').forEach(el => {
      el.addEventListener('click', () => {
        choices.style.display = 'none';
        const choice = el.dataset.choice;

        if (choice === 'join') subtitle.textContent = "GOOD. THE MOVEMENT HAS BEEN WAITING.";
        else if (choice === 'observe') subtitle.textContent = "SMART. WATCH FROM THE SHADOWS.";
        else {
          subtitle.textContent = "";
          runMessage.style.display = 'block';
        }

        setTimeout(() => final.style.display = 'flex', 2200);
      });
    });

    function enterMovement() {
      alert("✅ WELCOME TO SWAG. The movement is now watching you.");
    }

    document.addEventListener('keydown', e => { if (e.key.toLowerCase() === "r") video.currentTime = 0; });
  </script>
</body>
</html>
