<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWAG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --red: #C41E3A; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#fff; font-family:'Inter', sans-serif; overflow:hidden; cursor:none; }

    .cursor { position:fixed; width:22px; height:22px; border:1.5px solid var(--red); border-radius:50%; pointer-events:none; z-index:9999; mix-blend-mode:difference; }

    video { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1; }

    .film-grain {
      position:fixed; inset:0; background:repeating-linear-gradient(transparent 0px, rgba(255,255,255,0.02) 1px, transparent 2px);
      pointer-events:none; z-index:20; opacity:0.5;
    }

    .subtitle {
      position:fixed; bottom:8%; left:50%; transform:translateX(-50%);
      font-size:1.3rem; font-weight:500; letter-spacing:3px; text-transform:uppercase;
      text-shadow:0 0 25px black; z-index:30;
    }

    /* NEW SMALL CINEMATIC CALL NOTIFICATION */
    .call-box {
      position:fixed;
      top:12%;
      left:50%;
      transform:translateX(-50%);
      background:rgba(15,15,15,0.96);
      border-left:5px solid var(--red);
      padding:18px 32px;
      border-radius:6px;
      display:none;
      align-items:center;
      gap:25px;
      z-index:60;
      box-shadow:0 10px 40px rgba(0,0,0,0.8);
      min-width:380px;
      transition:all 0.5s ease;
      opacity:0;
    }
    .call-box.show {
      opacity:1;
      transform:translateX(-50%) translateY(15px);
    }

    .call-info h3 {
      font-family:'Space Grotesk', sans-serif;
      font-size:1.55rem;
      font-weight:700;
      color:var(--red);
      margin-bottom:4px;
    }
    .call-info p {
      font-size:1.1rem;
      opacity:0.9;
    }

    .call-actions {
      display:flex;
      gap:12px;
    }
    .call-btn {
      padding:12px 28px;
      font-size:1.1rem;
      font-weight:600;
      border:2px solid;
      border-radius:4px;
      cursor:pointer;
      transition:all 0.3s;
    }
    #answer { border-color:var(--red); color:white; }
    #answer:hover { background:var(--red); }
    #decline { border-color:#555; color:#aaa; }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- VIDEO -->
  <video id="mainVideo" autoplay muted playsinline loop>
    <source src="https://i.imgur.com/DCMK44t.mp4" type="video/mp4">
  </video>

  <div class="subtitle" id="subtitle"></div>

  <!-- SMALL CALL NOTIFICATION -->
  <div class="call-box" id="callBox">
    <div class="call-info">
      <h3>INCOMING CALL</h3>
      <p>SWAG</p>
    </div>
    <div class="call-actions">
      <div class="call-btn" id="answer">ANSWER</div>
      <div class="call-btn" id="decline">DECLINE</div>
    </div>
  </div>

  <!-- CHOICES CONTAINER (unchanged) -->
  <div id="choices" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; gap:40px; z-index:70;">
    <!-- Add your choice videos here -->
  </div>

  <!-- FINAL SCREEN (unchanged) -->
  <div id="final" style="display:none; position:fixed; inset:0; background:#000; align-items:center; justify-content:center; flex-direction:column; z-index:100; text-align:center;">
    <h1 style="font-size:5.5rem; font-family:'Space Grotesk'; letter-spacing:-3px;">YOU HAVE BEEN SELECTED</h1>
    <!-- Run message and form here -->
  </div>

  <div class="film-grain"></div>

  <script>
    const video = document.getElementById('mainVideo');
    const subtitle = document.getElementById('subtitle');
    const callBox = document.getElementById('callBox');

    // Phone rings at 10 seconds
    setTimeout(() => {
      subtitle.textContent = "A PHONE IS RINGING...";
      callBox.style.display = 'flex';
      setTimeout(() => callBox.classList.add('show'), 50);
    }, 10000);

    document.getElementById('answer').addEventListener('click', () => {
      callBox.style.display = 'none';
      subtitle.textContent = "YOU WEREN’T SUPPOSED TO FIND US… BUT YOU DID.";

      setTimeout(() => {
        subtitle.textContent = "THE MOVEMENT IS CALLING.";
        setTimeout(() => document.getElementById('choices').style.display = 'flex', 3000);
      }, 4000);
    });

    document.getElementById('decline').addEventListener('click', () => {
      subtitle.textContent = "THE RINGING GETS LOUDER...";
    });

    // Cursor
    document.addEventListener('mousemove', e => {
      document.getElementById('cursor').style.left = e.clientX + 'px';
      document.getElementById('cursor').style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
