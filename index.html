<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWAG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --red: #C41E3A; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#fff; font-family:'Inter', sans-serif; overflow:hidden; cursor:none; }

    .cursor { position:fixed; width:24px; height:24px; border:1.5px solid var(--red); border-radius:50%; pointer-events:none; z-index:9999; mix-blend-mode:difference; }

    video { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1; filter: contrast(1.15) saturate(1.3); }

    .film-grain {
      position:fixed; inset:0; background:repeating-linear-gradient(transparent 0px, rgba(255,255,255,0.025) 1px, transparent 2px);
      pointer-events:none; z-index:20; opacity:0.45;
    }

    .subtitle {
      position:fixed; bottom:9%; left:50%; transform:translateX(-50%);
      font-size:1.35rem; font-weight:500; text-align:center; letter-spacing:3px;
      text-transform:uppercase; text-shadow:0 0 30px rgba(0,0,0,0.9); z-index:30;
    }

    /* MODERN SUBTLE CALL NOTIFICATION */
    .call-notification {
      position:fixed;
      bottom:15%;
      left:50%;
      transform:translateX(-50%);
      background:rgba(20,20,20,0.95);
      border:2px solid var(--red);
      border-radius:8px;
      padding:20px 60px;
      display:none;
      align-items:center;
      gap:25px;
      z-index:60;
      box-shadow:0 0 40px rgba(196,30,58,0.5);
      transition:all 0.6s ease;
      opacity:0;
    }
    .call-notification.show {
      opacity:1;
      transform:translateX(-50%) translateY(-20px);
    }
    .call-title {
      font-family:'Space Grotesk', sans-serif;
      font-size:2.1rem;
      font-weight:700;
      letter-spacing:1px;
      color:var(--red);
    }
    .btn {
      padding:14px 40px;
      font-size:1.3rem;
      font-weight:600;
      border:2px solid;
      cursor:pointer;
      transition:all 0.4s ease;
    }
    #answer { border-color:var(--red); }
    #answer:hover { background:var(--red); transform:scale(1.08); }
    #decline { border-color:#555; color:#aaa; }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- VIDEO -->
  <video id="mainVideo" autoplay muted playsinline loop>
    <source src="https://i.imgur.com/DCMK44t.mp4" type="video/mp4">
  </video>

  <div class="subtitle" id="subtitle"></div>

  <!-- SUBTLE CALL NOTIFICATION (Movie-style) -->
  <div class="call-notification" id="callNotif">
    <div>
      <div class="call-title">INCOMING CALL</div>
      <div style="font-size:1.8rem; font-weight:700;">SWAG</div>
    </div>
    <div style="display:flex; gap:15px;">
      <div class="btn" id="answer">ANSWER</div>
      <div class="btn" id="decline">DECLINE</div>
    </div>
  </div>

  <!-- CHOICES & FINAL SCREEN (same as before) -->
  <div class="choice-container" id="choices" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; gap:40px; z-index:60;">
    <!-- Your choice cards here - unchanged -->
    <div class="choice" data-choice="join"><video src="YOUR_JOIN_LINK.mp4" muted loop style="width:100%;height:190px;object-fit:cover;border-radius:4px;"></video><h2>JOIN</h2></div>
    <div class="choice" data-choice="observe"><video src="YOUR_OBSERVE_LINK.mp4" muted loop style="width:100%;height:190px;object-fit:cover;border-radius:4px;"></video><h2>OBSERVE</h2></div>
    <div class="choice" data-choice="run"><video src="YOUR_RUN_LINK.mp4" muted loop style="width:100%;height:190px;object-fit:cover;border-radius:4px;"></video><h2>RUN</h2></div>
  </div>

  <div class="final-screen" id="final" style="display:none; position:fixed; inset:0; background:#000; align-items:center; justify-content:center; flex-direction:column; z-index:100; text-align:center;">
    <!-- Same final screen as previous version -->
    <h1 style="font-size:5.8rem; font-family:'Space Grotesk'; letter-spacing:-4px; margin-bottom:30px;">YOU HAVE BEEN SELECTED</h1>
    <div id="runMessage" style="display:none;">
      <div class="run-text" style="font-size:4.8rem; font-weight:700; line-height:1.1;">EVERY SATURDAY<br>6 AM</div>
      <div class="run-text" style="font-size:3.2rem; color:var(--red);">PRELLER SQUARE</div>
    </div>
    <!-- Form here (same as before) -->
  </div>

  <div class="film-grain"></div>

  <!-- AUDIO -->
  <audio id="ambient" loop>
    <source src="https://freesound.org/data/previews/202/202325_3248244-lq.mp3" type="audio/mpeg"> <!-- Rooftop wind -->
  </audio>
  <audio id="ringtone" loop>
    <source src="https://freesound.org/data/previews/276/276951_5123853-lq.mp3" type="audio/mpeg"> <!-- Old phone ring -->
  </audio>

  <script>
    const video = document.getElementById('mainVideo');
    const subtitle = document.getElementById('subtitle');
    const callNotif = document.getElementById('callNotif');
    const ambient = document.getElementById('ambient');
    const ringtone = document.getElementById('ringtone');

    // Start ambient sound
    ambient.volume = 0.4;
    ambient.play();

    // Phone rings at 10 seconds
    setTimeout(() => {
      subtitle.textContent = "A PHONE IS RINGING...";
      ringtone.volume = 0.7;
      ringtone.play();
      
      callNotif.style.display = 'flex';
      setTimeout(() => callNotif.classList.add('show'), 100);
    }, 10000);

    document.getElementById('answer').addEventListener('click', () => {
      ringtone.pause();
      callNotif.style.display = 'none';
      subtitle.textContent = "YOU WEREN’T SUPPOSED TO FIND US… BUT YOU DID.";

      setTimeout(() => {
        subtitle.textContent = "THE MOVEMENT IS CALLING.";
        setTimeout(() => document.getElementById('choices').style.display = 'flex', 2800);
      }, 3800);
    });

    document.getElementById('decline').addEventListener('click', () => {
      subtitle.textContent = "THE RINGING GETS LOUDER...";
      ringtone.volume = 1.0; // Gets louder
    });

    // Cursor
    document.addEventListener('mousemove', e => {
      document.getElementById('cursor').style.left = e.clientX + 'px';
      document.getElementById('cursor').style.top = e.clientY + 'px';
    });

    document.addEventListener('keydown', e => { if (e.key.toLowerCase() === "r") video.currentTime = 0; });
  </script>
</body>
</html>
